<!-- Floating WhatsApp FAB -->
<a
    href="https://wa.me/{{ hugo.Data.landing.cta.whatsapp.telefono }}?text={{ hugo.Data.landing.cta.whatsapp.mensaje | urlquery }}"
    target="_blank"
    rel="noopener noreferrer"
    class="fixed bottom-8 right-8 z-100 bg-whatsapp text-white p-4 rounded-2xl shadow-2xl hover:scale-110 active:scale-95 transition-all group flex items-center justify-center"
    title="Contactar por WhatsApp"
>
    {{ with resources.Get "icons/whatsapp.svg" }}
        <div class="h-8 w-8 [&>svg]:w-full [&>svg]:h-full">{{ .Content | safeHTML }}</div>
    {{ end }}
</a>
