<nav id="main-nav" class="fixed top-0 left-0 w-full z-50 transition-all duration-300 py-6 text-warm-cream">
    <div class="container mx-auto px-6 flex justify-between items-center">
        <a href="/" class="flex flex-col items-center justify-center transition-colors duration-300">
            <span class="font-body text-[10px] sm:text-xs font-bold uppercase tracking-[0.3em] leading-none mb-1">Café</span>
            <span class="font-display text-2xl sm:text-3xl font-bold uppercase tracking-[0.1em] leading-none">Lumadasa</span>
        </a>

        <div class="hidden md:flex items-center space-x-12">
            <a href="#historia" class="font-body text-sm font-semibold uppercase tracking-widest opacity-80 hover:opacity-100 transition-opacity">Nuestra Historia</a>
            <a href="#seleccion" class="font-body text-sm font-semibold uppercase tracking-widest opacity-80 hover:opacity-100 transition-opacity">La Selección</a>
            <a href="mailto:{{ hugo.Data.landing.cta.email }}" class="bg-terracotta text-warm-cream px-8 py-3 rounded-full font-body text-sm font-bold uppercase tracking-widest hover:bg-terracotta/90 transition-all shadow-ambient">
                {{ hugo.Data.landing.cta.label_secundario }}
            </a>
        </div>

        <button class="md:hidden opacity-80 hover:opacity-100 transition-opacity">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>
</nav>

<script>
    const nav = document.getElementById('main-nav');
    
    function updateNav() {
        if (window.scrollY > 50) {
            nav.classList.add('bg-warm-cream/90', 'backdrop-blur-xl', 'py-4', 'shadow-sm', 'text-deep-forest');
            nav.classList.remove('py-6', 'text-warm-cream');
        } else {
            nav.classList.remove('bg-warm-cream/90', 'backdrop-blur-xl', 'py-4', 'shadow-sm', 'text-deep-forest');
            nav.classList.add('py-6', 'text-warm-cream');
        }
    }

    window.addEventListener('scroll', updateNav);
    
    // Ensure initial state is correct on load
    updateNav();
</script>
