<nav id="main-nav" class="fixed top-0 left-0 w-full z-50 transition-all duration-300 py-6 text-warm-cream">
    <div class="container mx-auto px-6 flex justify-between items-center relative z-10">
        <a href="/" class="inline-flex flex-col items-center justify-center w-max transition-colors duration-300">
            <span class="font-body text-[10px] sm:text-xs font-bold uppercase tracking-[0.4em] leading-none mb-1 opacity-80">CAFÉ</span>
            <span class="font-display text-2xl sm:text-3xl font-bold uppercase tracking-widest leading-none">LUMADASA</span>
        </a>

        <div class="hidden md:flex items-center space-x-12">
            <a href="#historia" class="font-body text-sm font-semibold uppercase tracking-widest opacity-80 hover:opacity-100 transition-opacity">{{ hugo.Data.landing.historia.prefijo }}</a>
            <a href="#seleccion" class="font-body text-sm font-semibold uppercase tracking-widest opacity-80 hover:opacity-100 transition-opacity">{{ hugo.Data.landing.cafe.titulo }}</a>
            <a href="mailto:{{ hugo.Data.landing.cta.email }}" class="bg-terracotta text-warm-cream px-8 py-3 rounded-full font-body text-sm font-bold uppercase tracking-widest hover:bg-terracotta/90 transition-all shadow-ambient">
                {{ hugo.Data.landing.cta.label_secundario }}
            </a>
        </div>

        <button id="mobile-menu-btn" class="md:hidden opacity-80 hover:opacity-100 transition-opacity" aria-label="Toggle Menu">
            {{ with resources.Get "icons/menu.svg" }}
                <div id="menu-icon-open" class="h-8 w-8 [&>svg]:w-full [&>svg]:h-full">
                    {{ .Content | safeHTML }}
                </div>
            {{ end }}
            {{ with resources.Get "icons/close.svg" }}
                <div id="menu-icon-close" class="h-8 w-8 hidden [&>svg]:w-full [&>svg]:h-full">
                    {{ .Content | safeHTML }}
                </div>
            {{ end }}
        </button>
    </div>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="absolute top-0 left-0 w-full h-screen bg-warm-cream flex flex-col justify-center items-center opacity-0 pointer-events-none transition-opacity duration-300 md:hidden -z-10">
        <div class="flex flex-col space-y-8 items-center">
            <a href="#historia" class="mobile-nav-link font-display text-3xl text-deep-forest hover:opacity-70 transition-opacity">{{ hugo.Data.landing.historia.prefijo }}</a>
            <a href="#seleccion" class="mobile-nav-link font-display text-3xl text-deep-forest hover:opacity-70 transition-opacity">{{ hugo.Data.landing.cafe.titulo }}</a>
            <a href="mailto:{{ hugo.Data.landing.cta.email }}" class="mobile-nav-link bg-terracotta text-warm-cream px-10 py-4 rounded-full font-body text-sm font-bold uppercase tracking-widest hover:bg-terracotta/90 transition-all shadow-ambient mt-4">
                {{ hugo.Data.landing.cta.label_secundario }}
            </a>
        </div>
    </div>
</nav>

<script>
    const nav = document.getElementById('main-nav');
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const menuIconOpen = document.getElementById('menu-icon-open');
    const menuIconClose = document.getElementById('menu-icon-close');
    const mobileNavLinks = document.querySelectorAll('.mobile-nav-link');
    
    let isMobileMenuOpen = false;

    function toggleMobileMenu() {
        isMobileMenuOpen = !isMobileMenuOpen;
        if (isMobileMenuOpen) {
            mobileMenu.classList.remove('opacity-0', 'pointer-events-none');
            mobileMenu.classList.add('opacity-100', 'pointer-events-auto');
            menuIconOpen.classList.add('hidden');
            menuIconClose.classList.remove('hidden');
            nav.classList.add('text-deep-forest');
            nav.classList.remove('text-warm-cream');
            document.body.style.overflow = 'hidden'; // Prevent scrolling
        } else {
            mobileMenu.classList.add('opacity-0', 'pointer-events-none');
            mobileMenu.classList.remove('opacity-100', 'pointer-events-auto');
            menuIconOpen.classList.remove('hidden');
            menuIconClose.classList.add('hidden');
            document.body.style.overflow = '';
            updateNav(); // Reset nav color based on scroll
        }
    }

    mobileMenuBtn.addEventListener('click', toggleMobileMenu);
    
    // Close mobile menu when clicking a link
    mobileNavLinks.forEach(link => {
        link.addEventListener('click', () => {
            if(isMobileMenuOpen) toggleMobileMenu();
        });
    });
    
    function updateNav() {
        if (isMobileMenuOpen) return; // Menu open overrides scroll styles

        if (window.scrollY > 50) {
            nav.classList.add('bg-warm-cream/90', 'backdrop-blur-xl', 'py-4', 'shadow-sm', 'text-deep-forest');
            nav.classList.remove('py-6', 'text-warm-cream');
        } else {
            nav.classList.remove('bg-warm-cream/90', 'backdrop-blur-xl', 'py-4', 'shadow-sm', 'text-deep-forest');
            nav.classList.add('py-6', 'text-warm-cream');
        }
    }

    window.addEventListener('scroll', updateNav);
    
    // Ensure initial state is correct on load
    updateNav();
</script>
