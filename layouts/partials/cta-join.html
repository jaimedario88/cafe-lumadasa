<section class="py-24 md:py-40 bg-surface-low overflow-hidden">
    <div class="container mx-auto px-6">
        <div class="max-w-4xl mx-auto text-center">
            <h2 class="font-display text-5xl md:text-8xl text-deep-forest mb-12 text-balance leading-tight">
                {{ hugo.Data.landing.cta.titulo }}
            </h2>
            <p class="font-body text-xl md:text-2xl text-deep-forest/60 mb-16 max-w-2xl mx-auto leading-relaxed text-balance">
                {{ hugo.Data.landing.cta.cuerpo }}
            </p>
            
            <div class="flex flex-col sm:flex-row items-center justify-center gap-6">
                <a href="#seleccion" class="w-full sm:w-auto bg-terracotta text-warm-cream px-12 py-6 rounded-full font-body text-sm font-bold uppercase tracking-[0.2em] shadow-xl hover:scale-105 active:scale-95 transition-all text-center">
                    {{ hugo.Data.landing.cta.label_primario }}
                </a>
                <a href="mailto:{{ hugo.Data.landing.cta.email }}" class="w-full sm:w-auto border-2 border-deep-forest/10 text-deep-forest px-12 py-6 rounded-full font-body text-sm font-bold uppercase tracking-[0.2em] hover:bg-deep-forest hover:text-warm-cream active:scale-95 transition-all text-center">
                    {{ hugo.Data.landing.cta.label_secundario }}
                </a>
            </div>

            <!-- Subtle background decorative text -->
            <div class="mt-24 opacity-[0.03] select-none pointer-events-none">
                <span class="font-display text-[15vw] whitespace-nowrap uppercase tracking-tighter">LUMADASA · PLANADAS · TOLIMA</span>
            </div>
        </div>
    </div>
</section>
